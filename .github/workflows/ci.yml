---
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Run tests
        # We invoke ``coverage run`` rather than ``pytest --cov`` so that
        # coverage starts before pytest loads our plugin via its
        # ``pytest11`` entry point — otherwise the plugin's module-level
        # imports run before tracing begins and are reported as missed.
        run: |
          uv run --extra=dev --python=${{ matrix.python-version }} coverage run -m pytest -s -vvv tests/
          uv run --extra=dev --python=${{ matrix.python-version }} coverage report

  completion-ci:
    needs: build
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
